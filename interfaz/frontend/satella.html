<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satella</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #08060d;
    --bg2:       #0e0b16;
    --bg3:       #171022;
    --border:    rgba(180,140,255,0.09);
    --border2:   rgba(180,140,255,0.20);
    --txt:       #ece7f5;
    --txt2:      #9385b3;
    --accent:    #b388ff;
    --accent2:   #7c3aed;
    --deep:      #4c1d95;
    --star:      #c4b5fd;
    --user-bg:   #18142a;
    --sat-bg:    #110c1c;
    --thinking:  rgba(124,58,237,0.08);
    --radius:    14px;
    --radius-sm: 8px;
    --mono:      'JetBrains Mono', ui-monospace, Menlo, Consolas, monospace;
    /* matices por personalidad */
    --v-echidna: #c4a7ff;
    --v-ram:     #ff9a9a;
    --v-rem:     #a9c7ff;
    --v-emilia:  #a7e3c0;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--txt);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: relative;
  }
  /* aura de la bruja de los celos */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(1000px 480px at 50% -10%, rgba(124,58,237,0.16), transparent 70%),
      radial-gradient(700px 360px at 100% 115%, rgba(76,29,149,0.12), transparent 70%);
  }
  body > * { position: relative; z-index: 1; }

  /* ── HEADER ─────────────────────────────────────────────── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: rgba(14,11,22,0.7); backdrop-filter: blur(10px); flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #7c3aed, #4c1d95);
    box-shadow: 0 0 20px rgba(124,58,237,0.45);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #fff; flex-shrink: 0; position: relative;
  }
  .avatar::after {
    content: ''; position: absolute; bottom: 1px; right: 1px;
    width: 9px; height: 9px; border-radius: 50%;
    background: #22c55e; border: 2px solid var(--bg);
  }
  .avatar.thinking::after { background: #f59e0b; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .header-name {
    font-family: 'Syne', sans-serif; font-weight: 600; font-size: 17px;
    letter-spacing: 0.02em; color: var(--txt);
  }
  .header-sub { font-size: 12px; color: var(--txt2); margin-top: 1px; }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .btn-icon {
    width: 34px; height: 34px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: transparent; color: var(--txt2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.15s;
  }
  .btn-icon:hover { background: var(--bg3); color: var(--txt); border-color: var(--border2); }
  .btn-icon.active { background: rgba(124,58,237,0.14); color: var(--accent); border-color: rgba(124,58,237,0.35); }
  .btn-icon.code { font-family: var(--mono); font-size: 12px; font-weight: 600; }

  /* ── MENSAJES ────────────────────────────────────────────── */
  .messages { flex: 1; overflow-y: auto; padding: 24px 0; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 5px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  .msg-row {
    display: flex; padding: 6px 24px; gap: 10px;
    max-width: 820px; margin: 0 auto; width: 100%; animation: fadeUp 0.2s ease;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500;
    transition: box-shadow .2s;
  }
  .msg-avatar.satella-av {
    background: radial-gradient(circle at 35% 30%, #7c3aed, #4c1d95);
    color: #ece7f5; font-family: 'Syne', sans-serif;
  }
  .msg-avatar.user-av {
    background: var(--bg3); border: 1px solid var(--border2); color: var(--txt2); font-family: 'Syne', sans-serif;
  }

  .msg-bubble {
    max-width: 74%; padding: 11px 15px; border-radius: var(--radius);
    line-height: 1.6; font-size: 14.5px; white-space: pre-wrap; word-break: break-word;
  }
  .msg-bubble.has-code { max-width: 94%; }
  .msg-row.satella .msg-bubble {
    background: var(--sat-bg); border: 1px solid var(--border);
    border-bottom-left-radius: 4px; color: var(--txt);
  }
  .msg-row.user .msg-bubble {
    background: var(--user-bg); border: 1px solid var(--border2);
    border-bottom-right-radius: 4px; color: var(--txt);
  }
  .msg-row.satella.iniciacion .msg-bubble {
    border-color: rgba(124,58,237,0.25); background: rgba(124,58,237,0.05);
  }

  /* matices por personalidad — borde del globo + glow del avatar */
  .msg-row.satella[data-voz="echidna"] .msg-bubble { border-left: 2px solid rgba(196,167,255,.55); }
  .msg-row.satella[data-voz="ram"]     .msg-bubble { border-left: 2px solid rgba(255,154,154,.55); }
  .msg-row.satella[data-voz="rem"]     .msg-bubble { border-left: 2px solid rgba(169,199,255,.55); }
  .msg-row.satella[data-voz="emilia"]  .msg-bubble { border-left: 2px solid rgba(167,227,192,.55); }
  .msg-row.satella[data-voz="echidna"] .msg-avatar { box-shadow: 0 0 13px rgba(196,167,255,.45); }
  .msg-row.satella[data-voz="ram"]     .msg-avatar { box-shadow: 0 0 13px rgba(255,154,154,.45); }
  .msg-row.satella[data-voz="rem"]     .msg-avatar { box-shadow: 0 0 13px rgba(169,199,255,.45); }
  .msg-row.satella[data-voz="emilia"]  .msg-avatar { box-shadow: 0 0 13px rgba(167,227,192,.45); }

  .msg-meta {
    font-size: 11px; color: var(--txt2); margin-top: 5px; opacity: 0.75;
    display: flex; align-items: center; gap: 7px;
  }
  .msg-row.user .msg-meta { justify-content: flex-end; }

  /* ── ETIQUETA DE VOZ ─────────────────────────────────────── */
  .voz-badge {
    display: inline-block; font-size: 9.5px; letter-spacing: 0.6px; text-transform: uppercase;
    padding: 1px 8px; border-radius: 10px; font-weight: 600; font-family: 'Syne', sans-serif;
  }
  .voz-echidna { background: rgba(168,130,255,0.16); color: var(--v-echidna); }
  .voz-ram     { background: rgba(255,120,120,0.16); color: var(--v-ram); }
  .voz-rem     { background: rgba(120,170,255,0.16); color: var(--v-rem); }
  .voz-emilia  { background: rgba(150,220,180,0.16); color: var(--v-emilia); }

  /* ── BLOQUES DE CÓDIGO (estilo Claude) ───────────────────── */
  .prose { white-space: pre-wrap; }
  .prose:not(:first-child) { margin-top: 8px; }
  .codeblock {
    margin: 9px 0; border: 1px solid var(--border2); border-radius: 10px;
    overflow: hidden; background: #0b0814;
  }
  .cb-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px; background: rgba(124,58,237,0.10); border-bottom: 1px solid var(--border);
  }
  .cb-lang {
    font-size: 10.5px; color: var(--accent); font-family: 'Syne', sans-serif;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .cb-actions { display: flex; gap: 6px; }
  .cb-actions button {
    background: transparent; border: 1px solid var(--border2); color: var(--txt2);
    font-size: 11px; padding: 3px 9px; border-radius: 7px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: 0.15s; white-space: nowrap;
  }
  .cb-actions button:hover { color: var(--accent); border-color: var(--accent); background: rgba(124,58,237,0.08); }
  .codeblock pre { margin: 0; padding: 12px 14px; overflow-x: auto; }
  .codeblock pre::-webkit-scrollbar { height: 6px; }
  .codeblock pre::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  .codeblock code { font-family: var(--mono); font-size: 12.5px; line-height: 1.6; background: transparent !important; padding: 0 !important; }

  /* thinking */
  .thinking-row { display: flex; padding: 6px 24px; gap: 10px; max-width: 820px; margin: 0 auto; width: 100%; }
  .thinking-bubble {
    padding: 11px 15px; border-radius: var(--radius); border-bottom-left-radius: 4px;
    background: var(--thinking); border: 1px solid rgba(124,58,237,0.18);
    display: flex; gap: 5px; align-items: center;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0.4; animation: blink 1.2s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,100% { opacity: 0.2; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.1); } }

  /* ── INPUT ───────────────────────────────────────────────── */
  .input-area { padding: 16px 24px; border-top: 1px solid var(--border); background: rgba(14,11,22,0.7); backdrop-filter: blur(10px); flex-shrink: 0; }
  .input-inner {
    display: flex; align-items: flex-end; gap: 10px; max-width: 820px; margin: 0 auto;
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 12px; transition: border-color 0.15s;
  }
  .input-inner:focus-within { border-color: rgba(124,58,237,0.4); box-shadow: 0 0 0 3px rgba(124,58,237,0.10); }
  #input-texto {
    flex: 1; background: transparent; border: none; outline: none; color: var(--txt);
    font-family: 'DM Sans', sans-serif; font-size: 14.5px; line-height: 1.5; resize: none;
    max-height: 120px; min-height: 22px;
  }
  #input-texto::placeholder { color: var(--txt2); opacity: 0.6; }

  .btn-send, .btn-mic {
    width: 32px; height: 32px; border-radius: var(--radius-sm); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; transition: all 0.15s;
  }
  .btn-send { background: linear-gradient(135deg, var(--accent2), var(--accent)); color: white; box-shadow: 0 2px 12px rgba(124,58,237,0.35); }
  .btn-send:hover { filter: brightness(1.12); }
  .btn-send:disabled { opacity: 0.35; cursor: not-allowed; box-shadow: none; }
  .btn-mic { background: transparent; border: 1px solid var(--border); color: var(--txt2); }
  .btn-mic:hover { background: var(--bg3); color: var(--txt); border-color: var(--border2); }
  .btn-mic.recording { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.4); color: #ef4444; animation: pulse-mic 1s ease-in-out infinite; }
  @keyframes pulse-mic { 0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.2); } 50% { box-shadow: 0 0 0 6px rgba(239,68,68,0); } }

  /* ── STATUS ──────────────────────────────────────────────── */
  .status-bar { text-align: center; font-size: 11.5px; color: var(--txt2); padding: 6px 0 2px; max-width: 820px; margin: 0 auto; opacity: 0.7; min-height: 20px; transition: opacity 0.2s; }

  /* ── EMPTY STATE ─────────────────────────────────────────── */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; color: var(--txt2); font-size: 14px; opacity: 0.55; pointer-events: none; }
  .star-symbol { font-size: 38px; color: var(--star); opacity: 0.5; text-shadow: 0 0 24px rgba(124,58,237,0.6); }

  @media (max-width: 640px) {
    .msg-row { padding: 4px 14px; } .input-area { padding: 12px 14px; } .header { padding: 12px 14px; }
    .msg-bubble { max-width: 86%; } .msg-bubble.has-code { max-width: 98%; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="avatar" id="avatar">✦</div>
    <div>
      <div class="header-name">Satella</div>
      <div class="header-sub" id="header-sub">conectando...</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-icon code" title="Editor de código" onclick="location.href='/editor'">&lt;/&gt;</button>
    <button class="btn-icon active" id="btn-voz" title="Activar / desactivar voz" onclick="toggleVoz()">🔊</button>
    <button class="btn-icon" title="Cerrar sesión" onclick="cerrarSesion()">◼</button>
  </div>
</div>

<!-- MENSAJES -->
<div class="messages" id="messages">
  <div class="empty-state" id="empty-state">
    <div class="star-symbol">✦</div>
    <div>Satella está aquí</div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="status-bar" id="status-bar"></div>
  <div class="input-inner">
    <textarea id="input-texto" placeholder="Escribe algo..." rows="1" autocomplete="off"></textarea>
    <button class="btn-mic" id="btn-mic" title="Hablar" onclick="toggleMic()">🎤</button>
    <button class="btn-send" id="btn-send" title="Enviar" onclick="enviarMensaje()">↑</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
const socket = io();

// ── Estado ────────────────────────────────────────────────────
let vozActiva = true, grabando = false, recognition = null, audioActual = null;

// ── DOM refs ──────────────────────────────────────────────────
const messagesEl = document.getElementById('messages');
const emptyEl    = document.getElementById('empty-state');
const inputEl    = document.getElementById('input-texto');
const sendBtn    = document.getElementById('btn-send');
const micBtn     = document.getElementById('btn-mic');
const vozBtn     = document.getElementById('btn-voz');
const avatarEl   = document.getElementById('avatar');
const subEl      = document.getElementById('header-sub');
const statusEl   = document.getElementById('status-bar');

// ── Socket events ─────────────────────────────────────────────
socket.on('connect', () => { subEl.textContent = 'conectada'; setStatus(''); });
socket.on('disconnect', () => { subEl.textContent = 'desconectada'; setStatus('Satella se desconectó'); });

socket.on('satella_pensando', ({ estado }) => {
  if (estado) { avatarEl.classList.add('thinking'); mostrarThinking(); setStatus('Satella está pensando...'); }
  else { avatarEl.classList.remove('thinking'); ocultarThinking(); setStatus(''); }
});

socket.on('satella_responde', ({ texto, audio, iniciacion, voz }) => {
  ocultarThinking(); avatarEl.classList.remove('thinking'); setStatus('');
  agregarMensaje('satella', texto, iniciacion, voz);
  if (vozActiva && audio) reproducirAudio(audio);
});

socket.on('sesion_cerrada', ({ resumen }) => { agregarMensaje('satella', '— sesión guardada —'); setStatus(''); });

socket.on('voz_estado', ({ activa }) => {
  vozActiva = activa;
  vozBtn.className = 'btn-icon' + (activa ? ' active' : '');
  vozBtn.textContent = activa ? '🔊' : '🔇';
});

// ── Render de contenido: prosa + bloques de código (estilo Claude) ──
function renderContenido(container, texto) {
  container.innerHTML = '';
  const regex = /```(\w*)\r?\n([\s\S]*?)```/g;
  let last = 0, m, tuvoCodigo = false;
  while ((m = regex.exec(texto)) !== null) {
    tuvoCodigo = true;
    if (m.index > last) addProse(container, texto.slice(last, m.index));
    addCode(container, (m[1] || 'python').toLowerCase(), m[2].replace(/\n+$/, ''));
    last = regex.lastIndex;
  }
  if (last < texto.length) addProse(container, texto.slice(last));
  if (!container.childNodes.length) addProse(container, texto);
  return tuvoCodigo;
}

function addProse(container, txt) {
  const t = txt.replace(/^\n+|\n+$/g, '');
  if (!t.trim()) return;
  const p = document.createElement('div');
  p.className = 'prose';
  p.textContent = t;
  container.appendChild(p);
}

function addCode(container, lang, code) {
  const wrap = document.createElement('div'); wrap.className = 'codeblock';
  const head = document.createElement('div'); head.className = 'cb-head';
  const lbl  = document.createElement('span'); lbl.className = 'cb-lang'; lbl.textContent = lang || 'código';
  const acts = document.createElement('div'); acts.className = 'cb-actions';

  const bCopy = document.createElement('button'); bCopy.textContent = '⧉ Copiar';
  bCopy.onclick = () => navigator.clipboard.writeText(code).then(() => {
    bCopy.textContent = 'copiado ✓'; setTimeout(() => bCopy.textContent = '⧉ Copiar', 1400);
  });
  const bDl = document.createElement('button'); bDl.textContent = '↓ Descargar';
  bDl.onclick = () => {
    const ext = (lang === 'python') ? 'py' : (lang === 'javascript' || lang === 'js') ? 'js' : 'txt';
    const blob = new Blob([code], { type: 'text/plain' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'satella_codigo.' + ext; a.click(); URL.revokeObjectURL(a.href);
  };
  acts.appendChild(bCopy); acts.appendChild(bDl);
  head.appendChild(lbl); head.appendChild(acts);

  const pre = document.createElement('pre'); const co = document.createElement('code');
  co.className = 'language-' + (lang || 'plaintext'); co.textContent = code;
  pre.appendChild(co);
  wrap.appendChild(head); wrap.appendChild(pre);
  container.appendChild(wrap);
  if (window.hljs) { try { hljs.highlightElement(co); } catch (e) {} }
}

// ── Funciones de mensajes ─────────────────────────────────────
function agregarMensaje(quien, texto, iniciacion = false, voz = null) {
  if (emptyEl) emptyEl.style.display = 'none';

  const row = document.createElement('div');
  row.className = `msg-row ${quien}` + (iniciacion ? ' iniciacion' : '');
  if (quien === 'satella' && voz) row.dataset.voz = voz;

  const avatarDiv = document.createElement('div');
  avatarDiv.className = `msg-avatar ${quien === 'satella' ? 'satella-av' : 'user-av'}`;
  avatarDiv.textContent = quien === 'satella' ? '✦' : 'S';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  if (quien === 'satella') {
    const tuvoCodigo = renderContenido(bubble, texto);
    if (tuvoCodigo) bubble.classList.add('has-code');
  } else {
    bubble.textContent = texto;
  }

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const hora = document.createElement('span');
  hora.textContent = horaActual();
  meta.appendChild(hora);
  if (quien === 'satella' && voz) {
    const badge = document.createElement('span');
    badge.className = 'voz-badge voz-' + voz;
    badge.textContent = voz;
    meta.appendChild(badge);
  }

  const contenido = document.createElement('div');
  contenido.style.display = 'flex';
  contenido.style.flexDirection = 'column';
  contenido.style.minWidth = '0';
  contenido.appendChild(bubble);
  contenido.appendChild(meta);

  if (quien === 'satella') { row.appendChild(avatarDiv); row.appendChild(contenido); }
  else { row.appendChild(contenido); row.appendChild(avatarDiv); }

  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function mostrarThinking() {
  ocultarThinking();
  const row = document.createElement('div');
  row.className = 'thinking-row'; row.id = 'thinking-indicator';
  const avDiv = document.createElement('div');
  avDiv.className = 'msg-avatar satella-av'; avDiv.textContent = '✦';
  const bubble = document.createElement('div');
  bubble.className = 'thinking-bubble';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  row.appendChild(avDiv); row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function ocultarThinking() { const t = document.getElementById('thinking-indicator'); if (t) t.remove(); }

// ── Enviar mensaje ────────────────────────────────────────────
function enviarMensaje() {
  const texto = inputEl.value.trim();
  if (!texto) return;
  agregarMensaje('user', texto);
  socket.emit('mensaje', { texto });
  inputEl.value = ''; inputEl.style.height = 'auto';
  sendBtn.disabled = true; setTimeout(() => sendBtn.disabled = false, 500);
}
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensaje(); }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ── Micrófono ─────────────────────────────────────────────────
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setStatus('Tu navegador no soporta voz. Usa Chrome.'); return;
  }
  if (grabando) { detenerGrabacion(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'es-CO'; recognition.continuous = false; recognition.interimResults = false;
  recognition.onresult = (e) => {
    const texto = e.results[0][0].transcript.trim();
    if (texto) { inputEl.value = texto; enviarMensaje(); }
    detenerGrabacion();
  };
  recognition.onerror = (e) => { setStatus('Error de micrófono: ' + e.error); detenerGrabacion(); };
  recognition.onend = () => { detenerGrabacion(); };
  recognition.start();
  grabando = true; micBtn.classList.add('recording'); micBtn.textContent = '⏹'; setStatus('Escuchando...');
}
function detenerGrabacion() {
  if (recognition) { try { recognition.stop(); } catch (e) {} }
  grabando = false; micBtn.classList.remove('recording'); micBtn.textContent = '🎤'; setStatus('');
}

// ── Audio ─────────────────────────────────────────────────────
function reproducirAudio(base64) {
  try {
    if (audioActual) { audioActual.pause(); audioActual = null; }
    const audio = new Audio('data:audio/mp3;base64,' + base64);
    audioActual = audio;
    audio.play().catch(e => console.warn('Audio autoplay:', e));
  } catch (e) { console.warn('Error reproduciendo audio:', e); }
}

// ── Controles ─────────────────────────────────────────────────
function toggleVoz() { vozActiva = !vozActiva; socket.emit('toggle_voz', { activa: vozActiva }); }
function cerrarSesion() {
  if (confirm('¿Cerrar sesión y guardar en la memoria de Satella?')) socket.emit('cerrar_sesion');
}

// ── Utils ─────────────────────────────────────────────────────
function setStatus(msg) { statusEl.textContent = msg; statusEl.style.opacity = msg ? '1' : '0'; }
function horaActual() { return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }); }
</script>
