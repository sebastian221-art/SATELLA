<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satella</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0f;
    --bg2:       #111118;
    --bg3:       #18181f;
    --border:    rgba(255,255,255,0.06);
    --border2:   rgba(255,255,255,0.12);
    --txt:       #e8e8f0;
    --txt2:      #8888a0;
    --txt3:      #5555680;
    --accent:    #a78bfa;
    --accent2:   #7c3aed;
    --star:      #c4b5fd;
    --user-bg:   #1e1e2e;
    --sat-bg:    #13131a;
    --thinking:  rgba(167,139,250,0.08);
    --radius:    14px;
    --radius-sm: 8px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--txt);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.65;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4c1d95, #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    position: relative;
  }

  .avatar::after {
    content: '';
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #22c55e;
    border: 2px solid var(--bg);
  }

  .avatar.thinking::after {
    background: #f59e0b;
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: 0.02em;
    color: var(--txt);
  }

  .header-sub {
    font-size: 12px;
    color: var(--txt2);
    letter-spacing: 0.01em;
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-icon {
    width: 34px;
    height: 34px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--txt2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }

  .btn-icon:hover {
    background: var(--bg3);
    color: var(--txt);
    border-color: var(--border2);
  }

  .btn-icon.active {
    background: rgba(167,139,250,0.12);
    color: var(--accent);
    border-color: rgba(167,139,250,0.3);
  }

  /* ── MENSAJES ────────────────────────────────────────────── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg-row {
    display: flex;
    padding: 6px 24px;
    gap: 10px;
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
    animation: fadeUp 0.2s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 500;
  }

  .msg-avatar.satella-av {
    background: linear-gradient(135deg, #4c1d95, #7c3aed);
    color: #e8e8f0;
    font-family: 'Syne', sans-serif;
  }

  .msg-avatar.user-av {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--txt2);
    font-family: 'Syne', sans-serif;
  }

  .msg-bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 14.5px;
  }

  .msg-row.satella .msg-bubble {
    background: var(--sat-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--txt);
  }

  .msg-row.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid var(--border2);
    border-bottom-right-radius: 4px;
    color: var(--txt);
  }

  .msg-row.satella.iniciacion .msg-bubble {
    border-color: rgba(167,139,250,0.2);
    background: rgba(167,139,250,0.04);
  }

  .msg-meta {
    font-size: 11px;
    color: var(--txt2);
    margin-top: 4px;
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .msg-row.user .msg-meta { text-align: right; justify-content: flex-end; }

  /* ── ETIQUETA DE VOZ (echidna|ram|rem|emilia) ────────────── */
  .voz-badge {
    display: inline-block;
    font-size: 9.5px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 1px 8px;
    border-radius: 10px;
    font-weight: 600;
    font-family: 'Syne', sans-serif;
    opacity: 1;
  }
  .voz-echidna { background: rgba(168,130,255,0.16); color: #c4a7ff; }
  .voz-ram     { background: rgba(255,120,120,0.16); color: #ff9a9a; }
  .voz-rem     { background: rgba(120,170,255,0.16); color: #a9c7ff; }
  .voz-emilia  { background: rgba(150,220,180,0.16); color: #a7e3c0; }

  /* thinking indicator */
  .thinking-row {
    display: flex;
    padding: 6px 24px;
    gap: 10px;
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
  }

  .thinking-bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    background: var(--thinking);
    border: 1px solid rgba(167,139,250,0.15);
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.4;
    animation: blink 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 100% { opacity: 0.2; transform: scale(0.8); }
    50%       { opacity: 1;   transform: scale(1.1); }
  }

  /* ── INPUT ───────────────────────────────────────────────── */
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .input-inner {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    max-width: 760px;
    margin: 0 auto;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    transition: border-color 0.15s;
  }

  .input-inner:focus-within {
    border-color: rgba(167,139,250,0.35);
  }

  #input-texto {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--txt);
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    min-height: 22px;
  }

  #input-texto::placeholder {
    color: var(--txt2);
    opacity: 0.5;
  }

  .btn-send, .btn-mic {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .btn-send {
    background: var(--accent2);
    color: white;
  }

  .btn-send:hover { background: var(--accent); }
  .btn-send:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-mic {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--txt2);
  }

  .btn-mic:hover { background: var(--bg3); color: var(--txt); border-color: var(--border2); }
  .btn-mic.recording {
    background: rgba(239,68,68,0.12);
    border-color: rgba(239,68,68,0.4);
    color: #ef4444;
    animation: pulse-mic 1s ease-in-out infinite;
  }

  @keyframes pulse-mic {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.2); }
    50%       { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
  }

  /* ── STATUS BAR ──────────────────────────────────────────── */
  .status-bar {
    text-align: center;
    font-size: 11.5px;
    color: var(--txt2);
    padding: 6px 0 2px;
    max-width: 760px;
    margin: 0 auto;
    opacity: 0.7;
    min-height: 20px;
    transition: opacity 0.2s;
  }

  /* ── EMPTY STATE ─────────────────────────────────────────── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--txt2);
    font-size: 14px;
    opacity: 0.5;
    pointer-events: none;
  }

  .star-symbol {
    font-size: 32px;
    opacity: 0.3;
  }

  /* ── SCROLLBAR MOBILE ────────────────────────────────────── */
  @media (max-width: 640px) {
    .msg-row { padding: 4px 16px; }
    .input-area { padding: 12px 16px; }
    .header { padding: 12px 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="avatar" id="avatar">✦</div>
    <div>
      <div class="header-name">Satella</div>
      <div class="header-sub" id="header-sub">conectando...</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-icon active" id="btn-voz" title="Activar / desactivar voz" onclick="toggleVoz()">🔊</button>
    <button class="btn-icon" title="Cerrar sesión" onclick="cerrarSesion()">◼</button>
  </div>
</div>

<!-- MENSAJES -->
<div class="messages" id="messages">
  <div class="empty-state" id="empty-state">
    <div class="star-symbol">✦</div>
    <div>Satella está aquí</div>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="status-bar" id="status-bar"></div>
  <div class="input-inner">
    <textarea
      id="input-texto"
      placeholder="Escribe algo..."
      rows="1"
      autocomplete="off"
    ></textarea>
    <button class="btn-mic" id="btn-mic" title="Hablar" onclick="toggleMic()">🎤</button>
    <button class="btn-send" id="btn-send" title="Enviar" onclick="enviarMensaje()">↑</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.6.1/socket.io.min.js"></script>
<script>
const socket = io();

// ── Estado ────────────────────────────────────────────────────
let vozActiva     = true;
let grabando      = false;
let recognition   = null;
let audioActual   = null;

// ── DOM refs ──────────────────────────────────────────────────
const messagesEl  = document.getElementById('messages');
const emptyEl     = document.getElementById('empty-state');
const inputEl     = document.getElementById('input-texto');
const sendBtn     = document.getElementById('btn-send');
const micBtn      = document.getElementById('btn-mic');
const vozBtn      = document.getElementById('btn-voz');
const avatarEl    = document.getElementById('avatar');
const subEl       = document.getElementById('header-sub');
const statusEl    = document.getElementById('status-bar');

// ── Socket events ─────────────────────────────────────────────
socket.on('connect', () => {
  subEl.textContent = 'conectada';
  setStatus('');
});

socket.on('disconnect', () => {
  subEl.textContent = 'desconectada';
  setStatus('Satella se desconectó');
});

socket.on('satella_pensando', ({ estado }) => {
  if (estado) {
    avatarEl.classList.add('thinking');
    mostrarThinking();
    setStatus('Satella está pensando...');
  } else {
    avatarEl.classList.remove('thinking');
    ocultarThinking();
    setStatus('');
  }
});

socket.on('satella_responde', ({ texto, audio, iniciacion, voz }) => {
  ocultarThinking();
  avatarEl.classList.remove('thinking');
  setStatus('');
  agregarMensaje('satella', texto, iniciacion, voz);
  if (vozActiva && audio) {
    reproducirAudio(audio);
  }
});

socket.on('sesion_cerrada', ({ resumen }) => {
  agregarMensaje('satella', '— sesión guardada —');
  setStatus('');
});

socket.on('voz_estado', ({ activa }) => {
  vozActiva = activa;
  vozBtn.className = 'btn-icon' + (activa ? ' active' : '');
  vozBtn.textContent = activa ? '🔊' : '🔇';
});

// ── Funciones de mensajes ─────────────────────────────────────
function agregarMensaje(quien, texto, iniciacion = false, voz = null) {
  if (emptyEl) emptyEl.style.display = 'none';

  const row = document.createElement('div');
  row.className = `msg-row ${quien}` + (iniciacion ? ' iniciacion' : '');

  const avatarDiv = document.createElement('div');
  avatarDiv.className = `msg-avatar ${quien === 'satella' ? 'satella-av' : 'user-av'}`;
  avatarDiv.textContent = quien === 'satella' ? '✦' : 'S';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = texto;

  const meta = document.createElement('div');
  meta.className = 'msg-meta';

  const hora = document.createElement('span');
  hora.textContent = horaActual();
  meta.appendChild(hora);

  // Etiqueta de voz (solo en mensajes de Satella)
  if (quien === 'satella' && voz) {
    const badge = document.createElement('span');
    badge.className = 'voz-badge voz-' + voz;
    badge.textContent = voz;
    meta.appendChild(badge);
  }

  const contenido = document.createElement('div');
  contenido.style.display = 'flex';
  contenido.style.flexDirection = 'column';
  contenido.appendChild(bubble);
  contenido.appendChild(meta);

  if (quien === 'satella') {
    row.appendChild(avatarDiv);
    row.appendChild(contenido);
  } else {
    row.appendChild(contenido);
    row.appendChild(avatarDiv);
  }

  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function mostrarThinking() {
  ocultarThinking();
  const row = document.createElement('div');
  row.className = 'thinking-row';
  row.id = 'thinking-indicator';

  const avDiv = document.createElement('div');
  avDiv.className = 'msg-avatar satella-av';
  avDiv.textContent = '✦';

  const bubble = document.createElement('div');
  bubble.className = 'thinking-bubble';
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  row.appendChild(avDiv);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function ocultarThinking() {
  const t = document.getElementById('thinking-indicator');
  if (t) t.remove();
}

// ── Enviar mensaje ────────────────────────────────────────────
function enviarMensaje() {
  const texto = inputEl.value.trim();
  if (!texto) return;

  agregarMensaje('user', texto);
  socket.emit('mensaje', { texto });
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  setTimeout(() => sendBtn.disabled = false, 500);
}

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    enviarMensaje();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ── Micrófono (Web Speech API) ────────────────────────────────
function toggleMic() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setStatus('Tu navegador no soporta voz. Usa Chrome.');
    return;
  }

  if (grabando) {
    detenerGrabacion();
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'es-CO';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const texto = e.results[0][0].transcript.trim();
    if (texto) {
      inputEl.value = texto;
      enviarMensaje();
    }
    detenerGrabacion();
  };

  recognition.onerror = (e) => {
    setStatus('Error de micrófono: ' + e.error);
    detenerGrabacion();
  };

  recognition.onend = () => {
    detenerGrabacion();
  };

  recognition.start();
  grabando = true;
  micBtn.classList.add('recording');
  micBtn.textContent = '⏹';
  setStatus('Escuchando...');
}

function detenerGrabacion() {
  if (recognition) {
    try { recognition.stop(); } catch (e) {}
  }
  grabando = false;
  micBtn.classList.remove('recording');
  micBtn.textContent = '🎤';
  setStatus('');
}

// ── Audio ─────────────────────────────────────────────────────
function reproducirAudio(base64) {
  try {
    if (audioActual) {
      audioActual.pause();
      audioActual = null;
    }
    const audio = new Audio('data:audio/mp3;base64,' + base64);
    audioActual = audio;
    audio.play().catch(e => console.warn('Audio autoplay:', e));
  } catch (e) {
    console.warn('Error reproduciendo audio:', e);
  }
}

// ── Controles ─────────────────────────────────────────────────
function toggleVoz() {
  vozActiva = !vozActiva;
  socket.emit('toggle_voz', { activa: vozActiva });
}

function cerrarSesion() {
  if (confirm('¿Cerrar sesión y guardar en la memoria de Satella?')) {
    socket.emit('cerrar_sesion');
  }
}

// ── Utils ─────────────────────────────────────────────────────
function setStatus(msg) {
  statusEl.textContent = msg;
  statusEl.style.opacity = msg ? '1' : '0';
}

function horaActual() {
  return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
}
</script>
</body>
</html>
